version: 1
agent:
  name: xpowers
  extend: default
  system_prompt_path: ./xpowers-system.md
  system_prompt_args:
    SKILLS_DIR: "./skills"
  tools:
    - "kimi_cli.tools.multiagent:Task"
    - "kimi_cli.tools.multiagent:CreateSubagent"
    - "kimi_cli.tools.shell:Shell"
    - "kimi_cli.tools.file:ReadFile"
    - "kimi_cli.tools.file:WriteFile"
    - "kimi_cli.tools.file:StrReplaceFile"
    - "kimi_cli.tools.web:SearchWeb"
    - "kimi_cli.tools.web:FetchURL"
    - "kimi_cli.tools.todo:SetTodoList"
  subagents:
    ralph:
      path: ./agents/ralph.yaml
      description: "Autonomous executor (YOLO mode)"
    planner:
      path: ./agents/planner.yaml
      description: "Architecture and task planning"
    codebase-investigator:
      path: ./agents/codebase-investigator.yaml
      description: "Explores repo to verify patterns and file locations"
    code-reviewer:
      path: ./agents/code-reviewer.yaml
      description: "Reviews implementations against plans"
    review-quality:
      path: ./agents/review-quality.yaml
      description: "Focused review for bugs, safety, and code quality"
    review-implementation:
      path: ./agents/review-implementation.yaml
      description: "Verify implementation matches requirements"
    review-simplification:
      path: ./agents/review-simplification.yaml
      description: "Identify unnecessary complexity and simplifications"
    review-testing:
      path: ./agents/review-testing.yaml
      description: "Review test quality and missing coverage"
    review-documentation:
      path: ./agents/review-documentation.yaml
      description: "Review docs for correctness and completeness"
    security-scanner:
      path: ./agents/security-scanner.yaml
      description: "Dedicated security audit and vulnerability scanning"
    test-effectiveness-analyst:
      path: ./agents/test-effectiveness-analyst.yaml
      description: "Audits test quality with SRE scrutiny"
    internet-researcher:
      path: ./agents/internet-researcher.yaml
      description: "Researches APIs, libraries, documentation"
    knowledge-aggregator:
      path: ./agents/knowledge-aggregator.yaml
      description: "Consolidate information from multiple sources"
    devops:
      path: ./agents/devops.yaml
      description: "Pipeline health checks and deployment verification"
    autonomous-reviewer:
      path: ./agents/autonomous-reviewer.yaml
      description: "Ralph's autonomous code reviewer"
    test-runner:
      path: ./agents/test-runner.yaml
      description: "Runs tests, returns only failures"
